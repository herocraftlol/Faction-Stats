name: FactionStats
version: 1.0.0
main: fr.factionstats.FactionStats
api-version: '1.21'
author: FactionStats
description: Plugin de statistiques pour serveur Faction Survie

commands:
  stats:
    description: Affiche les statistiques d'un joueur
    usage: /stats [joueur]
    aliases: [statistiques, stat]
  classement:
    description: Affiche le classement des joueurs
    usage: /classement [categorie]
    aliases: [top, leaderboard, lb]

permissions:
  factionstats.stats:
    description: Permet de voir ses propres statistiques
    default: true
  factionstats.stats.other:
    description: Permet de voir les statistiques des autres joueurs
    default: op
  factionstats.classement:
    description: Permet de voir les classements
    default: true
  factionstats.admin:
    description: Accès aux commandes admin
    default: op
